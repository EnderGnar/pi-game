<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pi Game</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg1: #0d0a1e;
    --bg2: #1a1040;
    --glass-bg: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.18);
    --neon: #00f5ff, #ff00e5, #aaff00, #ff9900, #ff4466, #a64dff;
    --c0: #00f5ff;
    --c1: #ff00e5;
    --c2: #aaff00;
    --c3: #ff9900;
    --c4: #ff4466;
    --c5: #a64dff;
    --white: rgba(255,255,255,0.9);
    --dim: rgba(255,255,255,0.3);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    background: radial-gradient(ellipse at 50% 30%, var(--bg2) 0%, var(--bg1) 70%);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    gap: 0;
  }

  /* Settings bar */
  #settings {
    width: 100%;
    max-width: 700px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .glass-pill {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 999px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--dim);
  }

  .glass-pill label { cursor: pointer; }

  .toggle-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    padding: 4px 12px;
    color: var(--white);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .toggle-btn.active {
    background: rgba(0,245,255,0.2);
    border-color: #00f5ff;
    color: #00f5ff;
    text-shadow: 0 0 8px #00f5ff;
  }

  .length-btns { display: flex; gap: 4px; }
  .length-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    padding: 4px 11px;
    color: var(--dim);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .length-btn.active {
    background: rgba(170,255,0,0.18);
    border-color: #aaff00;
    color: #aaff00;
    text-shadow: 0 0 8px #aaff00;
  }

  .restart-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    padding: 6px 18px;
    color: var(--dim);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .restart-btn:hover {
    background: rgba(255,255,255,0.15);
    color: var(--white);
  }

  /* Timer */
  #timer {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--white);
    text-shadow: 0 0 20px rgba(0,245,255,0.5);
    padding: 4px 0 10px;
    min-height: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Display area */
  #display-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  #display {
    position: relative;
    width: 100%;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* prefix "3." */
  #prefix {
    position: absolute;
    font-size: clamp(2rem, 8vw, 3.2rem);
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    z-index: 10;
    pointer-events: none;
    transition: transform 0.08s ease-out;
  }

  /* active slot (current digit input) */
  #active-slot {
    position: absolute;
    width: clamp(42px, 9vw, 60px);
    height: clamp(52px, 11vw, 72px);
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    font-weight: 700;
    z-index: 10;
    transition: transform 0.08s ease-out;
  }

  #active-slot .cursor {
    display: inline-block;
    width: 3px;
    height: 1.2em;
    background: rgba(255,255,255,0.8);
    border-radius: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* hint digit (show next) */
  #hint-digit {
    position: absolute;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    font-weight: 700;
    color: rgba(255,255,255,0.2);
    z-index: 10;
    transition: transform 0.08s ease-out;
    pointer-events: none;
  }

  /* trail digits */
  .trail-digit {
    position: absolute;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    font-weight: 700;
    border-radius: 10px;
    padding: 2px 4px;
    pointer-events: none;
    z-index: 5;
    transition: transform 0.08s ease-out, opacity 0.08s ease-out;
    transform-origin: center center;
    will-change: transform, opacity;
  }

  /* wrong digit animation */
  .trail-digit.wrong {
    animation: fall-away 0.45s ease-in forwards;
  }
  @keyframes fall-away {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    30%  { transform: translateY(20px) rotate(-12deg) scale(0.9); opacity: 0.8; }
    100% { transform: translateY(120px) rotate(-30deg) scale(0.5); opacity: 0; }
  }

  /* neon color classes */
  .nc0 { color: #00f5ff; text-shadow: 0 0 10px #00f5ff88; }
  .nc1 { color: #ff00e5; text-shadow: 0 0 10px #ff00e588; }
  .nc2 { color: #aaff00; text-shadow: 0 0 10px #aaff0088; }
  .nc3 { color: #ff9900; text-shadow: 0 0 10px #ff990088; }
  .nc4 { color: #ff4466; text-shadow: 0 0 10px #ff446688; }
  .nc5 { color: #a64dff; text-shadow: 0 0 10px #a64dff88; }

  /* Keypad */
  #keypad {
    width: 100%;
    max-width: 380px;
    padding: 10px 20px 20px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .key-btn {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 16px;
    height: 68px;
    font-family: inherit;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--white);
    cursor: pointer;
    transition: background 0.1s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .key-btn:active {
    background: rgba(255,255,255,0.18);
    transform: scale(0.94);
  }
  .key-btn.zero { grid-column: 2; }

  /* Game over overlay */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,10,30,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  #overlay h1 {
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: #aaff00;
    text-shadow: 0 0 30px #aaff00;
    letter-spacing: 0.05em;
  }
  #overlay .final-time {
    font-size: clamp(2.5rem, 9vw, 5rem);
    font-weight: 700;
    color: #00f5ff;
    text-shadow: 0 0 40px #00f5ff;
    letter-spacing: 0.08em;
  }
  #overlay .sub {
    color: var(--dim);
    font-size: 0.9rem;
  }
  #overlay .play-again {
    background: rgba(0,245,255,0.15);
    border: 1.5px solid #00f5ff;
    border-radius: 999px;
    padding: 12px 36px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    color: #00f5ff;
    text-shadow: 0 0 10px #00f5ff;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 8px;
  }
  #overlay .play-again:hover { background: rgba(0,245,255,0.28); }
  #overlay .play-again:active { transform: scale(0.96); }

  @media (max-width: 480px) {
    #settings { gap: 8px; padding: 10px 12px; }
    .glass-pill { padding: 6px 12px; font-size: 12px; }
    .key-btn { height: 60px; font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div id="settings">
  <div class="glass-pill">
    <label for="toggle-hint">Show next</label>
    <button class="toggle-btn active" id="toggle-hint">ON</button>
  </div>
  <div class="glass-pill">
    <span>Length</span>
    <div class="length-btns" id="length-btns">
      <button class="length-btn" data-len="10">10</button>
      <button class="length-btn" data-len="20">20</button>
      <button class="length-btn active" data-len="50">50</button>
      <button class="length-btn" data-len="100">100</button>
    </div>
  </div>
  <button class="glass-pill restart-btn" id="restart-btn">↺ Restart</button>
</div>

<div id="timer">0:00.00</div>

<div id="display-wrap">
  <div id="display">
    <span id="prefix">3.</span>
    <div id="active-slot"><span class="cursor"></span></div>
    <span id="hint-digit"></span>
  </div>
</div>

<div id="keypad">
  <button class="key-btn" data-digit="1">1</button>
  <button class="key-btn" data-digit="2">2</button>
  <button class="key-btn" data-digit="3">3</button>
  <button class="key-btn" data-digit="4">4</button>
  <button class="key-btn" data-digit="5">5</button>
  <button class="key-btn" data-digit="6">6</button>
  <button class="key-btn" data-digit="7">7</button>
  <button class="key-btn" data-digit="8">8</button>
  <button class="key-btn" data-digit="9">9</button>
  <button class="key-btn zero" data-digit="0">0</button>
</div>

<div id="overlay">
  <h1>Complete!</h1>
  <div class="final-time" id="final-time">0:00.00</div>
  <div class="sub" id="final-sub"></div>
  <button class="play-again" id="play-again">Play Again</button>
</div>

<script>
  const PI_DIGITS = "14159265358979323846264338327950288419716939937510" +
                    "58209749445923078164062862089986280348253421170679";

  const COLORS = 6;
  const neonColors = ['#00f5ff','#ff00e5','#aaff00','#ff9900','#ff4466','#a64dff'];

  // Layout constants (computed from active slot center)
  const SLOT_WIDTH = () => Math.min(60, Math.max(42, window.innerWidth * 0.09));
  const SLOT_GAP = () => SLOT_WIDTH() + 8;

  // Position (px from center of display) and scale for trail index i (0 = most recent)
  function trailX(i) {
    const gap = SLOT_GAP();
    return -(gap * (i + 1) + gap * 0.15);
  }
  function trailScale(i) {
    return Math.max(0.38, 1 - i * 0.055);
  }
  function trailOpacity(i) {
    return Math.max(0.15, 1 - i * 0.09);
  }

  // State
  let state = {
    sequenceLength: 50,
    showNext: true,
    typed: [],
    currentIndex: 0,
    startTime: null,
    endTime: null,
    active: false,
    rafId: null,
    trailSpans: [],   // [{el, digitIndex (in PI_DIGITS)}]
  };

  // DOM refs
  const timerEl = document.getElementById('timer');
  const displayEl = document.getElementById('display');
  const activeSlot = document.getElementById('active-slot');
  const prefixEl = document.getElementById('prefix');
  const hintEl = document.getElementById('hint-digit');
  const overlay = document.getElementById('overlay');
  const finalTimeEl = document.getElementById('final-time');
  const finalSubEl = document.getElementById('final-sub');

  // ── Utilities ──────────────────────────────────────────────────────────────

  function formatTime(ms) {
    const cs = Math.floor(ms / 10) % 100;
    const s  = Math.floor(ms / 1000) % 60;
    const m  = Math.floor(ms / 60000);
    return `${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
  }

  function colorClass(globalIndex) {
    return `nc${globalIndex % COLORS}`;
  }

  // ── Layout: place fixed elements ───────────────────────────────────────────

  function getDisplayCenter() {
    const rect = displayEl.getBoundingClientRect();
    return { x: rect.width / 2, y: rect.height / 2 };
  }

  function prefixWidth() {
    return prefixEl.getBoundingClientRect().width;
  }

  // Compute left offset so that the cursor of "3._" sits at display center.
  // Active slot center = display center. Prefix is to its left.
  function layoutStatic() {
    const pW = prefixEl.offsetWidth || 50;
    const sW = SLOT_WIDTH();
    // The group "3.[slot]" should be centered: total width = pW + sW
    // prefix left edge from center = -(pW + sW)/2
    const groupLeft = -(pW + sW) / 2;
    prefixEl.style.transform = `translateX(${groupLeft}px)`;
    activeSlot.style.transform = `translateX(${groupLeft + pW + sW/2}px)`;
    activeSlot.style.width = sW + 'px';

    // hint digit sits one slot-width to the right of active slot center
    const hintX = groupLeft + pW + sW + 10 + sW * 0.4;
    hintEl.style.transform = `translateX(${hintX}px)`;
  }

  // ── Trail management ───────────────────────────────────────────────────────

  function addTrailDigit(digit, globalIndex) {
    // First shift all existing spans one position further back
    for (let i = 0; i < state.trailSpans.length; i++) {
      const newPos = i + 1;
      const el = state.trailSpans[i].el;
      updateTrailSpan(el, newPos);
    }

    // Create new span at position 0 (just to the left of active slot)
    const el = document.createElement('span');
    el.className = `trail-digit ${colorClass(globalIndex)}`;
    el.textContent = digit;
    el.dataset.trailIndex = '0';

    // Start at active slot position, then transition to trail[0]
    const pW = prefixEl.offsetWidth || 50;
    const sW = SLOT_WIDTH();
    const groupLeft = -(pW + sW) / 2;
    const slotCenterX = groupLeft + pW + sW / 2;
    el.style.transform = `translateX(${slotCenterX}px) scale(1)`;
    el.style.opacity = '1';

    displayEl.appendChild(el);
    state.trailSpans.unshift({ el, digit, globalIndex });

    // Animate to trail position on next frame
    requestAnimationFrame(() => {
      updateTrailSpan(el, 0);
    });
  }

  function updateTrailSpan(el, i) {
    const pW = prefixEl.offsetWidth || 50;
    const sW = SLOT_WIDTH();
    const groupLeft = -(pW + sW) / 2;
    const slotCenterX = groupLeft + pW + sW / 2;

    const x = slotCenterX + trailX(i);
    const s = trailScale(i);
    const o = trailOpacity(i);
    el.style.transform = `translateX(${x}px) scale(${s})`;
    el.style.opacity = String(o);
    el.dataset.trailIndex = String(i);
  }

  function refreshAllTrail() {
    for (let i = 0; i < state.trailSpans.length; i++) {
      updateTrailSpan(state.trailSpans[i].el, i);
    }
  }

  function spawnWrongDigit(digit, globalIndex) {
    const el = document.createElement('span');
    el.className = `trail-digit ${colorClass(globalIndex)} wrong`;
    el.textContent = digit;

    const pW = prefixEl.offsetWidth || 50;
    const sW = SLOT_WIDTH();
    const groupLeft = -(pW + sW) / 2;
    const slotCenterX = groupLeft + pW + sW / 2;
    el.style.transform = `translateX(${slotCenterX}px) scale(1)`;
    el.style.opacity = '1';
    displayEl.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  function clearTrail() {
    state.trailSpans.forEach(({ el }) => el.remove());
    state.trailSpans = [];
  }

  // ── Timer ──────────────────────────────────────────────────────────────────

  function startTimer() {
    state.startTime = performance.now();
    state.active = true;
    rafLoop();
  }

  function rafLoop() {
    if (!state.active) return;
    const elapsed = performance.now() - state.startTime;
    timerEl.textContent = formatTime(elapsed);
    state.rafId = requestAnimationFrame(rafLoop);
  }

  function stopTimer() {
    state.active = false;
    if (state.rafId) cancelAnimationFrame(state.rafId);
    state.endTime = performance.now();
    const elapsed = state.endTime - state.startTime;
    timerEl.textContent = formatTime(elapsed);
    return elapsed;
  }

  // ── Hint ───────────────────────────────────────────────────────────────────

  function updateHint() {
    if (state.showNext && state.currentIndex < state.sequenceLength) {
      hintEl.textContent = PI_DIGITS[state.currentIndex];
      hintEl.style.opacity = '1';
    } else {
      hintEl.textContent = '';
      hintEl.style.opacity = '0';
    }
  }

  // ── Active slot ────────────────────────────────────────────────────────────

  function setActiveSlotContent(html) {
    activeSlot.innerHTML = html;
  }

  function resetActiveSlot() {
    setActiveSlotContent('<span class="cursor"></span>');
  }

  // ── Input handling ─────────────────────────────────────────────────────────

  function handleDigit(d) {
    if (state.endTime !== null && state.active === false && overlay.classList.contains('show')) return;

    const expected = PI_DIGITS[state.currentIndex];

    // Start timer on first digit
    if (state.startTime === null) {
      startTimer();
    }

    if (d === expected) {
      // Correct
      const globalIndex = state.currentIndex;
      state.typed.push(d);
      state.currentIndex++;
      addTrailDigit(d, globalIndex);
      resetActiveSlot();
      updateHint();

      if (state.currentIndex >= state.sequenceLength) {
        const elapsed = stopTimer();
        showGameOver(elapsed);
      }
    } else {
      // Wrong
      spawnWrongDigit(d, state.currentIndex);
      // Flash active slot red briefly
      activeSlot.style.borderColor = '#ff4466';
      activeSlot.style.boxShadow = '0 0 16px #ff446688';
      setTimeout(() => {
        activeSlot.style.borderColor = '';
        activeSlot.style.boxShadow = '';
      }, 300);
    }
  }

  // ── Game over ──────────────────────────────────────────────────────────────

  function showGameOver(elapsed) {
    finalTimeEl.textContent = formatTime(elapsed);
    finalSubEl.textContent = `${state.sequenceLength} digits of π`;
    overlay.classList.add('show');
  }

  // ── Reset ──────────────────────────────────────────────────────────────────

  function resetGame() {
    // Stop any running timer
    state.active = false;
    if (state.rafId) cancelAnimationFrame(state.rafId);

    // Clear trail
    clearTrail();

    // Reset state
    state.typed = [];
    state.currentIndex = 0;
    state.startTime = null;
    state.endTime = null;

    // Reset UI
    timerEl.textContent = '0:00.00';
    resetActiveSlot();
    overlay.classList.remove('show');
    layoutStatic();
    updateHint();
  }

  // ── Settings controls ──────────────────────────────────────────────────────

  document.getElementById('toggle-hint').addEventListener('click', function() {
    state.showNext = !state.showNext;
    this.textContent = state.showNext ? 'ON' : 'OFF';
    this.classList.toggle('active', state.showNext);
    updateHint();
  });

  document.getElementById('length-btns').addEventListener('click', function(e) {
    const btn = e.target.closest('.length-btn');
    if (!btn) return;
    document.querySelectorAll('.length-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.sequenceLength = parseInt(btn.dataset.len, 10);
    resetGame();
  });

  document.getElementById('restart-btn').addEventListener('click', resetGame);
  document.getElementById('play-again').addEventListener('click', resetGame);

  // ── Keyboard input ─────────────────────────────────────────────────────────

  document.addEventListener('keydown', (e) => {
    if (overlay.classList.contains('show')) {
      if (e.key === 'Enter' || e.key === ' ') { resetGame(); return; }
      return;
    }
    if (e.key >= '0' && e.key <= '9') {
      e.preventDefault();
      handleDigit(e.key);
    } else if (e.key === 'Enter') {
      resetGame();
    }
  });

  // ── Keypad input ───────────────────────────────────────────────────────────

  document.getElementById('keypad').addEventListener('click', (e) => {
    const btn = e.target.closest('.key-btn');
    if (!btn) return;
    handleDigit(btn.dataset.digit);
  });

  // Touch: prevent delay on mobile
  document.getElementById('keypad').addEventListener('touchend', (e) => {
    const btn = e.target.closest('.key-btn');
    if (!btn) return;
    e.preventDefault();
    handleDigit(btn.dataset.digit);
  }, { passive: false });

  // ── Init ───────────────────────────────────────────────────────────────────

  // Layout after fonts load
  document.fonts.ready.then(() => {
    layoutStatic();
    updateHint();
  });
  // Also layout on resize
  window.addEventListener('resize', () => {
    layoutStatic();
    refreshAllTrail();
  });

  // Initial render
  layoutStatic();
  updateHint();
</script>
</body>
</html>
